<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread & Butter</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="intro">

        <p id="typingText"></p>

        <a href="home.html">
            <button class="enter-btn">Click here to continue</button>
        </a>

    </div>

    <script>

        const text = "Welcome to Bread & Butter Bakery";
        let i = 0;

        function typeWriter() {

            if (i < text.length) {
                document.getElementById("typingText").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 80);
            }

            else {
                document.querySelector(".enter-btn").style.display = "inline-block";
            }

        }

        typeWriter();

        function enterSite() {
            window.location.href = "home.html";
        }

    </script>

</body>

</html>
